# ===================================================
# Perfil PROD - PostgreSQL
# Configure as variaveis de ambiente antes de subir:
#
#   DB_URL=jdbc:postgresql://localhost:5432/cadastro_clientes
#   DB_USERNAME=postgres
#   DB_PASSWORD=sua_senha_aqui
#
# Como ativar: SPRING_PROFILES_ACTIVE=prod
# ===================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexoes
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Flyway com script PostgreSQL
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Dialeto PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Valida schema contra as entidades (nao recria nada)
spring.jpa.hibernate.ddl-auto=validate

# Nao expoe o console H2 em producao
spring.h2.console.enabled=false
