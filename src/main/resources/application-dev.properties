# ===================================================
# Perfil DEV - banco H2 em memoria
# Acesse o console H2 em: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:cadastro_clientes
# ===================================================

spring.datasource.url=jdbc:h2:mem:cadastro_clientes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2 (so no perfil dev!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway com script especifico para H2
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true

# Dialeto H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Nao valida o schema no dev para evitar erros de tipo entre H2 e Postgres
spring.jpa.hibernate.ddl-auto=none
